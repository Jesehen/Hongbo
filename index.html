<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>宏博</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宏博">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16130e" id="theme-meta">
<!-- 使用系统字体，无需外部加载 -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#16130e;--sf:#201c16;--card:#2a2419;--card2:#342e22;
  --gold:#e8bc5c;--gdim:#9a7e3a;
  --tx:#f2e8d0;--tx2:#b8a882;--tx3:#7a6e58;
  --red:#e06060;--blue:#5aafdf;--green:#5adf9a;
  --bd:rgba(232,188,92,.2);--bd2:rgba(232,188,92,.4);
  --paper:#fefbf3;--ink:#1a1008;
}
body.light{
  --bg:#f0ebe0;--sf:#e8e1d4;--card:#ddd6c8;--card2:#d0c8b8;
  --gold:#8a6420;--gdim:#b08840;
  --tx:#1a1008;--tx2:#4a3c28;--tx3:#8a7860;
  --red:#c04040;--blue:#1a6aaa;--green:#2a8a5a;
  --bd:rgba(138,100,32,.25);--bd2:rgba(138,100,32,.5);
  --paper:#fff8f0;--ink:#1a1008;
}
html,body{height:100%;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:'Microsoft YaHei','PingFang SC',system-ui,sans-serif;height:100%;overflow:hidden;transition:background .25s,color .25s;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;-webkit-appearance:none;}
input,textarea,select{font-family:inherit;-webkit-appearance:none;}

/* FONTS */
.f-songti{font-family:'Songti SC','STSong',Georgia,serif!important;}
.f-heiti{font-family:'Heiti SC','STHeiti','黑体','PingFang SC',sans-serif!important;}
.f-kaiti{font-family:'Kaiti SC','STKaiti','华文楷体',serif!important;}
.f-fangsong{font-family:'STFangsong','华文仿宋',serif!important;}
.f-yahei{font-family:'PingFang SC','Microsoft YaHei',sans-serif!important;}
.f-notoserif{font-family:'Songti SC','STSong',Georgia,serif!important;}
.f-mashan{font-family:'Kaiti SC','STKaiti',cursive!important;}
/* AUTH */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;overflow-y:auto;padding:1.5rem;}
.auth-box{width:100%;max-width:360px;background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:2.4rem 2rem;text-align:center;}
.auth-book{font-size:2.8rem;display:block;margin-bottom:.8rem;}
.auth-title{font-family:Georgia,serif;font-size:1.5rem;color:var(--gold);font-weight:normal;margin-bottom:.35rem;}
.auth-sub{font-size:.82rem;color:var(--tx3);margin-bottom:1.5rem;line-height:1.7;}
.auth-back{display:flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--tx3);margin-bottom:1.1rem;background:none;border:none;cursor:pointer;}
.auth-row{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.55rem;}
.a-input{width:100%;padding:.75rem 1rem;background:var(--card);border:1.5px solid var(--bd);border-radius:9px;color:var(--tx);font-size:1rem;outline:none;}
.a-input:focus{border-color:var(--gold);}
.pw-wrap{position:relative;}
.pw-wrap .a-input{padding-right:3.2rem;}
.pw-eye{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--tx3);cursor:pointer;user-select:none;padding:.3rem;}
.a-err{color:var(--red);font-size:.79rem;min-height:1.1em;margin-bottom:.5rem;display:block;text-align:left;}
.btn-auth{width:100%;padding:.82rem;background:var(--gold);color:#16130e;font-weight:700;font-size:1rem;border-radius:10px;margin-top:.3rem;}
.btn-auth:active{background:var(--gdim);} 
.btn-auth:disabled{opacity:.5;} 
.a-foot{margin-top:1.1rem;padding-top:.9rem;border-top:1px solid var(--bd);display:flex;gap:.5rem;justify-content:center;}
.btn-xs{padding:.32rem .7rem;font-size:.76rem;color:var(--tx3);border:1px solid var(--bd);border-radius:6px;}
.remember-row{display:flex;align-items:center;gap:.5rem;margin:.1rem 0 .6rem;text-align:left;}
.remember-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);} 
.remember-row label{font-size:.8rem;color:var(--tx2);cursor:pointer;}
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;height:calc(50px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;gap:.4rem;}
.hdr-l{display:flex;align-items:center;gap:.5rem;min-width:0;}
.app-name{font-family:Georgia,serif;font-size:1.2rem;color:var(--gold);letter-spacing:.04em;white-space:nowrap;}
.acc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hdr-r{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.hdr-btn{padding:.35rem .65rem;font-size:.78rem;color:var(--tx2);border:1px solid var(--bd);border-radius:6px;white-space:nowrap;}
.hdr-btn:hover{color:var(--tx);} 
.theme-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--bd);font-size:1rem;} 
.mob-menu-btn{width:34px;height:34px;display:none;align-items:center;justify-content:center;border-radius:8px;color:var(--tx2);font-size:1.1rem;} 
/* DROPDOWN */
.hdr-dropdown{position:relative;} 
.hdr-drop-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--sf);border:1px solid var(--bd2);border-radius:12px;padding:.5rem;min-width:210px;z-index:500;display:none;flex-direction:column;gap:2px;box-shadow:0 8px 32px rgba(0,0,0,.4);} 
.hdr-drop-panel.show{display:flex;} 
.hdr-drop-item{padding:.58rem .85rem;border-radius:8px;font-size:.83rem;color:var(--tx2);text-align:left;white-space:nowrap;width:100%;} 
.hdr-drop-item:hover{background:var(--card);color:var(--tx);} 
.hdr-drop-item.red{color:var(--red);} 
.hdr-drop-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:.3rem .85rem .1rem;} 
/* INLINE SYNC */
.sync-inline{padding:.3rem .85rem .6rem;} 
.sync-sr{display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem;} 
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;} 
.sdot.green{background:var(--green);} 
.sdot.grey{background:var(--tx3);} 
.sdot.gold{background:var(--gold);} 
.sdot.red{background:var(--red);} 
.sdot-txt{font-size:.74rem;color:var(--tx3);} 
.sync-irow{display:flex;align-items:center;gap:.25rem;margin-bottom:.3rem;} 
.sync-irow input{flex:1;padding:.4rem .55rem;background:var(--card2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:.77rem;outline:none;} 
.sync-irow input:focus{border-color:var(--gold);} 
.sync-brow{display:flex;gap:.25rem;} 
.sbtn{flex:1;padding:.36rem .1rem;border-radius:6px;font-size:.74rem;font-weight:600;cursor:pointer;border:none;text-align:center;} 
.sbtn.p{background:var(--gold);color:#16130e;} 
.sbtn.g{background:var(--card2);color:var(--tx2);border:1px solid var(--bd);} 
/* LAYOUT */
#app{display:flex;flex-direction:column;height:100%;} 
main{display:flex;flex:1;overflow:hidden;} 
aside{width:260px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;} 
.col-hdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem .75rem .3rem;} 
.col-hdr-t{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);} 
.col-add{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--gold);font-size:1.15rem;} 
/* ... 原文件其余内容保持不变 ... */
</style>
<script>
function genAppIcon(){
  try{
    const S=180,cv=document.createElement('canvas');
    cv.width=cv.height=S;const c=cv.getContext('2d');
    const r=36;c.beginPath();c.moveTo(r,0);c.lineTo(S-r,0);c.quadraticCurveTo(S,0,S,r);
    c.lineTo(S,S-r);c.quadraticCurveTo(S,S,S-r,S);c.lineTo(r,S);
    c.quadraticCurveTo(0,S,0,S-r);c.lineTo(0,r);c.quadraticCurveTo(0,0,r,0);
    c.closePath();c.fillStyle='#16130e';c.fill();
    c.strokeStyle='rgba(232,188,92,0.35)';c.lineWidth=2.5;c.stroke();
    c.fillStyle='#e8bc5c';
    c.beginPath();c.moveTo(82,50);c.bezierCurveTo(58,53,44,63,44,90);
    c.bezierCurveTo(44,117,58,127,82,130);c.lineTo(82,50);c.fill();
    c.beginPath();c.moveTo(98,50);c.bezierCurveTo(122,53,136,63,136,90);
    c.bezierCurveTo(136,117,122,127,98,130);c.lineTo(98,50);c.fill();
    c.fillStyle='#c9a840';c.fillRect(82,50,16,80);
    c.strokeStyle='rgba(22,19,14,0.3)';c.lineWidth=1;
    for(let y=65;y<=115;y+=10){c.beginPath();c.moveTo(50,y);c.lineTo(80,y);c.stroke();c.beginPath();c.moveTo(100,y);c.lineTo(130,y);c.stroke();}
    c.beginPath();c.arc(90,90,70,0,Math.PI*2);c.strokeStyle='rgba(232,188,92,0.15)';c.lineWidth=1;c.stroke();
    ['apple-touch-icon'].forEach(rel=>{let l=document.querySelector("link[rel='"+rel+"']");if(!l){l=document.createElement('link');l.rel=rel;document.head.appendChild(l);}l.href=cv.toDataURL('image/png');l.sizes='180x180';});
    let fav=document.querySelector("link[rel='icon']");if(!fav){fav=document.createElement('link');fav.rel='icon';document.head.appendChild(fav);}fav.href=cv.toDataURL('image/png');
  }catch(e){}
}
genAppIcon();
</script>

<script id="hb-store">var __HB__={"v":3,"accounts":[]};</script>

<!-- AUTH: Account List -->
<div class="auth-screen" id="sc-list">
  <div class="auth-box">
    <span class="auth-book">📖</span>
    <h1 class="auth-title">宏博</h1>
    <p class="auth-sub" id="list-sub">选择账号登录</p>
    <div class="acc-list" id="acc-list"></div>
    <button class="btn-newacc" onclick="showNewAcc()">＋ 新建账号</button>
    <div class="a-foot">
      <button class="btn-xs" onclick="document.getElementById('imp-login').click()">导入备份</button>
      <input type="file" id="imp-login" accept=".json" style="display:none" onchange="importFromLogin(this)">
    </div>
  </div>
</div>

<!-- AUTH: Login -->
<div class="auth-screen" id="sc-login" style="display:none">
  <div class="auth-box">
    <button class="auth-back" onclick="showAccList()">← 返回</button>
    <span class="auth-book" id="login-av" style="font-size:2rem;margin-bottom:.6rem"></span>
    <h1 class="auth-title" id="login-name">登录</h1>
    <p class="auth-sub">请输入密码</p>
    <div class="auth-row">
      <div class="pw-wrap">
        <input class="a-input" type="password" id="pw-inp" placeholder="输入密码" autocomplete="current-password">
        <span class="pw-eye" onclick="togglePw('pw-inp','eye1')" id="eye1">显示</span>
      </div>
    </div>
    <div class="remember-row">
      <input type="checkbox" id="remember-cb" checked>
      <label for="remember-cb">30天内免登录</label>
    </div>
    <span class="a-err" id="login-err"></span>
    <button class="btn-auth" id="login-btn" onclick="handleLogin()">登 录</button>
  </div>
</div>

<!-- AUTH: New Account -->
<div class="auth-screen" id="sc-newaccount" style="display:none">
  <div class="auth-box">
    <button class="auth-back" onclick="showAccList()">← 返回</button>
    <span class="auth-book">✨</span>
    <h1 class="auth-title">新建账号</h1>
    <p class="auth-sub">设置账号名和登录密码</p>
    <div class="auth-row">
      <input class="a-input" type="text" id="new-name" placeholder="账号名（2-16字）" maxlength="16">
      <div class="pw-wrap">
        <input class="a-input" type="password" id="new-pw" placeholder="设置密码（至少4位）">
        <span class="pw-eye" onclick="togglePw('new-pw','eye2')" id="eye2">显示</span>
      </div>
      <div class="pw-wrap">
        <input class="a-input" type="password" id="new-pw2" placeholder="确认密码">
        <span class="pw-eye" onclick="togglePw('new-pw2','eye3')" id="eye3">显示</span>
      </div>
    </div>
    <span class="a-err" id="newaccount-err"></span>
    <button class="btn-auth" id="newaccount-btn" onclick="handleNewAccount()">创 建 账 号</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <div class="hdr-l">
      <button class="mob-menu-btn" onclick="toggleSidebar()" id="mob-menu">☰</button>
      <span style="font-size:1.2rem">📖</span>
      <span class="app-name">宏博</span>
      <div class="acc-dot" id="hdr-dot" style="margin-left:.2rem"></div>
      <span style="font-size:.72rem;color:var(--tx3)" id="hdr-accname"></span>
    </div>
    <div class="hdr-r">
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="切换主题">🌙</button>
      <button class="hdr-btn d-only" onclick="showAlbum()">相册</button>
      <button class="hdr-btn d-only" onclick="showTimeline()">时间轴</button>
      <button class="hdr-btn gold" onclick="saveHtmlFile()">💾 保存</button>
      <button class="hdr-btn gold d-only" onclick="doSwitchAcc()">切换</button>
    </div>
  </header>

  <main>
    <div id="aside-ov" onclick="closeSidebar()"></div>
    <aside id="sidebar">
      <div>
        <div class="col-hdr">
          <span class="col-hdr-t">专 栏</span>
          <button class="col-add" onclick="toggleColForm()">+</button>
        </div>
        <div class="col-new-form" id="col-form">
          <input class="col-inp" id="col-inp" placeholder="专栏名…" maxlength="20">
          <button class="col-ok" onclick="addColumn()">✓</button>
        </div>
        <div class="col-list" id="col-list"></div>
      </div>
      <button class="new-btn-desk" onclick="openWrite();closeSidebar()">＋ 新的记录</button>
      <div class="s-wrap">
        <input class="s-inp" type="text" id="s-inp" placeholder="🔍 搜索日记…" oninput="doSearch(this.value)">
      </div>
      <div class="e-list" id="e-list"></div>
    </aside>

    <div class="content" id="content">
      <!-- Desktop empty -->
      <div id="panel-empty" class="panel">
        <div class="empty-ctr">
          <div class="empty-icon">📖</div>
          <p class="empty-t">选择日记或新建记录</p>
          <p class="empty-s">你的文字，只属于你</p>
        </div>
      </div>

      <!-- Mobile list panel -->
      <div id="panel-mob-list">
        <div class="mob-col-bar" id="mob-col-bar">
          <button class="mob-col-add" onclick="mobAddCol()">+</button>
        </div>
        <div class="mob-s-wrap">
          <input class="mob-s-inp" type="text" id="mob-s-inp" placeholder="🔍 搜索日记…" oninput="mobSearch(this.value)">
        </div>
        <div class="mob-e-list" id="mob-e-list"></div>
      </div>

      <!-- Write panel -->
      <div id="panel-write" class="panel">
        <div class="mob-back-bar">
          <button class="mob-back-btn" onclick="cancelWrite()">← 取消</button>
          <span class="mob-view-title" id="mob-write-lbl"></span>
        </div>
        <div class="write-hdr">
          <span class="write-label" id="write-lbl">📝 新的记录</span>
          <span class="write-dt" id="write-dt"></span>
        </div>
        <div class="form-2col">
          <div class="form-g" style="margin-bottom:0">
            <label class="f-lbl">标题（可选）</label>
            <input class="f-inp" type="text" id="f-title" placeholder="给这篇起个标题…">
          </div>
          <div class="form-g" style="margin-bottom:0">
            <label class="f-lbl">归属专栏</label>
            <select class="f-sel" id="f-col"></select>
          </div>
        </div>
        <div class="form-g">
          <label class="f-lbl">📰 新闻链接（可选）</label>
          <div class="link-2col">
            <input class="f-inp" type="url" id="f-url" placeholder="粘贴新闻网址…">
            <input class="f-inp" type="text" id="f-linktitle" placeholder="链接标题…">
          </div>
        </div>
        <div class="form-g">
          <label class="f-lbl">正文 <span style="font-size:.63rem;color:var(--tx3);text-transform:none;letter-spacing:0">· 选中文字可改字号</span></label>
          <div class="editor-wrap">
            <div class="editor-tb">
              <button class="tb-btn" onclick="fmt('bold')"><b>B</b></button>
              <button class="tb-btn" onclick="fmt('italic')"><i>I</i></button>
              <button class="tb-btn" onclick="fmt('underline')"><u>U</u></button>
              <div class="tb-sep"></div>
              <select class="tb-sel" id="size-sel" onchange="applySelSize(this.value)" title="选中文字字号">
                <option value="">字号</option>
                <option value="11px">11</option><option value="13px">13</option>
                <option value="15px">15</option><option value="18px">18</option>
                <option value="22px">22</option><option value="28px">28</option>
              </select>
              <div class="tb-sep"></div>
              <select class="tb-sel" id="font-sel" onchange="applySelFont(this.value)" title="选中文字字体">
                <option value="">字体</option>
                <option value="'Songti SC','STSong','华文宋体',Georgia,serif">宋体</option>
                <option value="'Kaiti SC','STKaiti','华文楷体','楷体',serif">楷体</option>
                <option value="'STFangsong','华文仿宋','仿宋',serif">仿宋</option>
                <option value="'PingFang SC','Microsoft YaHei',sans-serif">苹方/雅黑</option>
                <option value="'Heiti SC','STHeiti','黑体',sans-serif">黑体</option>
              </select>
              <div class="tb-sep"></div>
              <button class="tb-btn" onclick="fmt('removeFormat')" style="font-size:.68rem">清格式</button>
            </div>
            <div class="f-editor" id="f-body" contenteditable="true" data-placeholder="今天想说些什么？这里只有你一个人…"></div>
            <div class="wc-bar"><span id="wc-write">0 字</span></div>
          </div>
        </div>
        <div class="form-g">
          <label class="f-lbl">默认字体（整篇）</label>
          <select class="f-sel" id="f-font">
            <option value="">跟随全局设置</option>
            <option value="f-songti">宋体（Songti SC）</option>
            <option value="f-kaiti">楷体（Kaiti SC）</option>
            <option value="f-fangsong">仿宋</option>
            <option value="f-yahei">苹方/微软雅黑</option>
            <option value="f-heiti">黑体</option>
            <option value="f-notoserif">华文宋体</option>
            <option value="f-mashan">华文楷体（草书感）</option>
          </select>
        </div>
        <div class="img-sec">
          <label class="f-lbl">📷 图片（最多9张）</label>
          <div class="img-drop" id="img-area" onclick="document.getElementById('img-file-inp').click()">
            <span class="img-hint">＋ 点击添加图片</span>
          </div>
          <input type="file" id="img-file-inp" accept="image/*" multiple onchange="handleImgUpload(this)">
        </div>
        <div class="form-actions">
          <button class="btn-save" onclick="saveEntry()">保 存</button>
          <button class="btn-cancel" onclick="cancelWrite()">取消</button>
        </div>
      </div>

      <!-- View panel -->
      <div id="panel-view" class="panel">
        <div class="mob-back-bar">
          <button class="mob-back-btn" onclick="mobBackToList()">← 列表</button>
        </div>
        <div class="v-hdr">
          <div class="v-meta">
            <span class="v-date" id="v-date"></span>
            <span class="v-tag" id="v-tag" style="display:none"></span>
            <button class="star-btn" id="star-btn" onclick="toggleStar()" title="收藏"></button>
            <span class="v-wc" id="v-wc"></span>
          </div>
          <h2 class="v-title" id="v-title"></h2>
        </div>
        <div class="link-card" id="v-link-card" style="display:none">
          <span class="link-icon">📰</span>
          <div class="link-info">
            <div class="link-title-t" id="v-link-title"></div>
            <div class="link-url-t" id="v-link-url"></div>
          </div>
          <div class="link-btns">
            <a class="link-btn" id="v-link-open" href="#" target="_blank" rel="noopener">打开↗</a>
            <button class="link-btn" onclick="copyLink()">复制</button>
          </div>
        </div>
        <div class="video-wrap" id="v-video-wrap" style="display:none">
          <iframe id="v-video-iframe" allowfullscreen></iframe>
        </div>
        <div class="v-imgs" id="v-imgs"></div>
        <div class="v-content" id="v-content"></div>
        <div class="v-actions">
          <button class="btn-edit" onclick="openEdit()">编辑</button>
          <button class="btn-del" onclick="deleteEntry()">删除</button>
        </div>
      </div>

      <!-- Album panel -->

      <button class="more-item" onclick="showAlbum();hideMore()">🖼 相册</button>
      <div style="background:var(--card);border-radius:10px;border:1px solid var(--bd);padding:.85rem 1rem;">
        <div style="font-size:.82rem;color:var(--gold);font-weight:600;margin-bottom:.5rem">字体切换（全局默认）</div>
        <div class="font-grid" id="more-font-grid"></div>
      </div>
      <div class="sync-section">

        <div class="sync-desc">连接 GitHub Token（需 gist 权限），手机和电脑日记自动同步。</div>
        <input class="sync-inp" type="password" id="sync-token-inp" placeholder="粘贴 GitHub Token…">

      </div>

      <button class="more-item" onclick="doExport();hideMore()">📤 导出备份</button>

      <input type="file" id="imp-main" accept=".json" style="display:none" onchange="doImport(this)">

<div id="img-modal" onclick="closeImgModal()">
  <img id="img-modal-img" src="" alt="">
  <div class="img-modal-caption" id="img-modal-caption"></div>
</div>
<div id="toast"></div>
<script>
/* ===== CONSTANTS ===== */
const COL_COLORS=['#e8bc5c','#5aafdf','#df5a7a','#5adf9a','#a07adf','#df8c5a','#5adfc0','#dfcf5a'];
const AVATARS=['🐉','🦁','🌙','🌸','⭐','🦋','🌊','🔥','🌿','🎯'];
const FONTS=[
  {id:'f-songti',label:'宋体'},
  {id:'f-kaiti',label:'楷体'},
  {id:'f-fangsong',label:'仿宋'},
  {id:'f-yahei',label:'苹方/雅黑'},
  {id:'f-heiti',label:'黑体'},
  {id:'f-notoserif',label:'华文宋体'},
  {id:'f-mashan',label:'华文楷体'},
];
const GIST_FILE='hongbo_diary_sync.json';
const GIST_DESC='hongbo-diary-sync-v3';

/* ===== STATE ===== */
let CKEY=null, curAccId=null, selAccId=null;
let data={entries:[],columns:[],settings:{theme:'dark',defaultFont:''},syncConfig:null};
let st={colId:'__all__',entryId:null,editId:null,q:'',mobQ:'',pendingImgs:[],curViewUrl:''};
let syncToken=null, syncGistId=null;

/* ===== STORE (embedded HTML) ===== */
function storeGet(){
  try{const ls=localStorage.getItem('hb_v3');if(ls){const p=JSON.parse(ls);if(p&&p.v===3)return p;}}catch{}
  return window.__HB__||{v:3,accounts:[]};
}
function storeSet(hb){
  window.__HB__=hb;
  try{document.getElementById('hb-store').textContent='var __HB__='+JSON.stringify(hb)+';';}catch{}
  try{localStorage.setItem('hb_v3',JSON.stringify(hb));}catch{}
}
function storeGetAcc(id){return storeGet().accounts.find(a=>a.id===id)||null;}
function storeUpdateAcc(id,patch){
  const hb=storeGet();
  const idx=hb.accounts.findIndex(a=>a.id===id);
  if(idx<0)return;
  hb.accounts[idx]={...hb.accounts[idx],...patch};
  storeSet(hb);
}
function storeAddAcc(acc){const hb=storeGet();hb.accounts.push(acc);storeSet(hb);} 
function storeRemoveAcc(id){const hb=storeGet();hb.accounts=hb.accounts.filter(a=>a.id!==id);storeSet(hb);} 

/* ===== SAVE HTML FILE ===== */
function saveHtmlFile(){
  const blob=new Blob([document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'宏博.html'});
  a.click();URL.revokeObjectURL(a.href);
  showToast('✅ 文件已保存');
}

/* ===== CRYPTO ===== */
async function deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function aesEnc(key,str){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(str));
  const out=new Uint8Array(12+ct.byteLength);out.set(iv);out.set(new Uint8Array(ct),12);
  return btoa(String.fromCharCode(...out));
}
async function aesDec(key,b64){
  const d=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:d.slice(0,12)},key,d.slice(12));
  return new TextDecoder().decode(pt);
}
async function saveAccData(){
  if(!CKEY||!curAccId)return;
  const enc=await aesEnc(CKEY,JSON.stringify(data));
  storeUpdateAcc(curAccId,{data:enc,updated:Date.now()});
}

/* ===== REMEMBER PASSWORD ===== */
async function getDeviceKey(){
  let dkB64=localStorage.getItem('hb_dk');
  if(!dkB64){
    const raw=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
    const exp=await crypto.subtle.exportKey('raw',raw);
    dkB64=btoa(String.fromCharCode(...new Uint8Array(exp)));
    localStorage.setItem('hb_dk',dkB64);
  }
  const kd=Uint8Array.from(atob(dkB64),c=>c.charCodeAt(0));
  return crypto.subtle.importKey('raw',kd,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function rememberPw(accId,pw){
  const key=await getDeviceKey();
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const payload=JSON.stringify({pw,accId,expires:Date.now()+30*24*60*60*1000});
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(payload));
  const out=new Uint8Array(12+ct.byteLength);out.set(iv);out.set(new Uint8Array(ct),12);
  localStorage.setItem('hb_rem_'+accId,btoa(String.fromCharCode(...out)));
}
async function checkRemember(accId){
  const stored=localStorage.getItem('hb_rem_'+accId);
  if(!stored)return null;
  try{
    const key=await getDeviceKey();
    const d=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:d.slice(0,12)},key,d.slice(12));
    const obj=JSON.parse(new TextDecoder().decode(pt));
    if(obj.accId!==accId||obj.expires<Date.now()){localStorage.removeItem('hb_rem_'+accId);return null;}
    return obj.pw;
  }catch{return null;}
}
function forgetPw(accId){localStorage.removeItem('hb_rem_'+accId);} 

/* ===== INIT ===== */
window.onload=async()=>{
  const hb=storeGet();window.__HB__=hb;
  // apply saved theme
  const savedTheme=localStorage.getItem('hb_theme')||'dark';
  if(savedTheme==='light')document.body.classList.add('light');
  updateThemeBtn();
  await showAccList();
  document.getElementById('pw-inp').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
  document.getElementById('new-pw2').addEventListener('keydown',e=>{if(e.key==='Enter')handleNewAccount();});
  document.getElementById('f-body').addEventListener('input',updateWordCount);
  document.getElementById('f-body').addEventListener('paste',e=>{
    e.preventDefault();
    const text=(e.clipboardData||window.clipboardData).getData('text/plain');
    document.execCommand('insertText',false,text);
  });
};

/* ===== THEME ===== */
function toggleTheme(){
  const isLight=document.body.classList.toggle('light');
  localStorage.setItem('hb_theme',isLight?'light':'dark');
  document.getElementById('theme-meta').content=isLight?'#f0ebe0':'#16130e';
  updateThemeBtn();
  if(data.settings){data.settings.theme=isLight?'light':'dark';saveAccData();}
}
function updateThemeBtn(){
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=document.body.classList.contains('light')?'🌙':'☀️';
}

/* ===== AUTH SCREENS ===== */
function hideAllScreens(){
  ['sc-list','sc-login','sc-newaccount'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('app').style.display='none';
}
async function showAccList(skipAuto=false){
  hideAllScreens();
  const hb=storeGet();
  const accs=hb.accounts||[];
  document.getElementById('list-sub').textContent=accs.length?'选择账号登录':'还没有账号，请新建一个';
  // check auto-login（切换账号时跳过）
  if(!skipAuto){
    for(const acc of accs){
      const savedPw=await checkRemember(acc.id);
      if(savedPw){
        selAccId=acc.id;
        await doLogin(acc.id,savedPw,false);
        return;
      }
    }
  }
  document.getElementById('acc-list').innerHTML=accs.map((acc,i)=>`
    <div class="acc-card" onclick="showLogin('${acc.id}')">
      <div class="acc-av" style="background:${COL_COLORS[i%COL_COLORS.length]}">${acc.avatar||'📖'}</div>
      <div><div class="acc-name">${esc(acc.name)}</div><div class="acc-hint">点击登录</div></div>
      <button class="acc-del" onclick="event.stopPropagation();deleteAcc('${acc.id}')">🗑</button>
    </div>`).join('');
  document.getElementById('sc-list').style.display='flex';
}
function showLogin(accId){
  selAccId=accId;
  const acc=storeGetAcc(accId);if(!acc)return;
  document.getElementById('login-av').textContent=acc.avatar||'📖';
  document.getElementById('login-name').textContent=acc.name;
  document.getElementById('pw-inp').value='';
  document.getElementById('login-err').textContent='';
  document.getElementById('login-btn').textContent='登 录';
  document.getElementById('login-btn').disabled=false;
  hideAllScreens();
  document.getElementById('sc-login').style.display='flex';
  setTimeout(()=>document.getElementById('pw-inp').focus(),80);
}
function showNewAcc(){
  ['new-name','new-pw','new-pw2'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('newaccount-err').textContent='';
  document.getElementById('newaccount-btn').textContent='创 建 账 号';
  document.getElementById('newaccount-btn').disabled=false;
  hideAllScreens();
  document.getElementById('sc-newaccount').style.display='flex';
  setTimeout(()=>document.getElementById('new-name').focus(),80);
}
function togglePw(inputId,eyeId){
  const i=document.getElementById(inputId),e=document.getElementById(eyeId);
  if(i.type==='password'){i.type='text';e.textContent='隐藏';}
  else{i.type='password';e.textContent='显示';}
}
async function handleLogin(){
  const pw=document.getElementById('pw-inp').value;
  const errEl=document.getElementById('login-err');
  errEl.textContent='';
  if(!pw){errEl.textContent='请输入密码';return;}
  const btn=document.getElementById('login-btn');
  btn.textContent='验证中…';btn.disabled=true;
  const remember=document.getElementById('remember-cb').checked;
  const ok=await doLogin(selAccId,pw,remember);
  if(!ok){
    errEl.textContent='密码错误，请重试';
    document.getElementById('pw-inp').value='';
    setTimeout(()=>document.getElementById('pw-inp').focus(),50);
    btn.textContent='登 录';btn.disabled=false;
  }
}
async function doLogin(accId,pw,remember){
  const acc=storeGetAcc(accId);
  if(!acc||!acc.salt||!acc.ver)return false;
  try{
    const salt=Uint8Array.from(atob(acc.salt),c=>c.charCodeAt(0));
    const key=await deriveKey(pw,salt);
    const ver=await aesDec(key,acc.ver);
    if(ver!=='HONGBO_OK')return false;
    CKEY=key;curAccId=accId;
    if(acc.data){const plain=await aesDec(CKEY,acc.data);data={entries:[],columns:[],settings:{theme:'dark',defaultFont:''},syncConfig:null,...JSON.parse(plain)};}
    else data={entries:[],columns:[],settings:{theme:'dark',defaultFont:''},syncConfig:null};
    if(remember)await rememberPw(accId,pw);
    enterApp();
    return true;
  }catch{CKEY=null;curAccId=null;return false;}
}
async function handleNewAccount(){
  const name=document.getElementById('new-name').value.trim();
  const pw=document.getElementById('new-pw').value;
  const pw2=document.getElementById('new-pw2').value;
  const errEl=document.getElementById('newaccount-err');
  errEl.textContent='';
  if(name.length<2){errEl.textContent='账号名至少2个字';return;}
  if(pw.length<4){errEl.textContent='密码至少需要4位';return;}
  if(pw!==pw2){errEl.textContent='两次密码不一致';return;}
  const hb=storeGet();
  if(hb.accounts.find(a=>a.name===name)){errEl.textContent='账号名已存在';return;}
  const btn=document.getElementById('newaccount-btn');
  btn.textContent='创建中…';btn.disabled=true;
  try{
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    const salt=crypto.getRandomValues(new Uint8Array(16));
    const saltB64=btoa(String.fromCharCode(...salt));
    const key=await deriveKey(pw,salt);
    const ver=await aesEnc(key,'HONGBO_OK');
    const avatarIdx=hb.accounts.length%AVATARS.length;
    storeAddAcc({id,name,avatar:AVATARS[avatarIdx],salt:saltB64,ver,data:null});
    CKEY=key;curAccId=id;
    data={entries:[],columns:[],settings:{theme:'dark',defaultFont:''},syncConfig:null};
    await saveAccData();
    await rememberPw(id,pw);
    enterApp();
  }catch{errEl.textContent='创建失败';btn.textContent='创 建 账 号';btn.disabled=false;}
}
function deleteAcc(accId){
  const acc=storeGetAcc(accId);if(!acc)return;
  if(!confirm('删除账号「'+acc.name+'」？所有日记将永久消失！'))return;
  storeRemoveAcc(accId);forgetPw(accId);showAccList();
}
function enterApp(){
  hideAllScreens();
  document.getElementById('app').style.display='flex';
  const hb=storeGet();
  const accs=hb.accounts||[];
  const acc=accs.find(a=>a.id===curAccId);
  const idx=accs.indexOf(acc);
  if(acc){
    document.getElementById('hdr-accname').textContent=acc.name;
    document.getElementById('hdr-dot').style.background=COL_COLORS[idx%COL_COLORS.length];
  }
  // apply theme from data
  const theme=data.settings?.theme||'dark';
  if(theme==='light'&&!document.body.classList.contains('light'))document.body.classList.add('light');
  else if(theme==='dark'&&document.body.classList.contains('light'))document.body.classList.remove('light');
  updateThemeBtn();
  // apply default font
  applyGlobalFont(data.settings?.defaultFont||'');
  st={colId:'__all__',entryId:null,editId:null,q:'',mobQ:'',pendingImgs:[],curViewUrl:''};
  document.getElementById('s-inp').value='';
  document.getElementById('mob-s-inp').value='';
  renderAll();
  // load sync config
  if(data.syncConfig){syncToken=data.syncConfig.token;syncGistId=data.syncConfig.gistId;}
  if(document.getElementById('sync-token-inp'))document.getElementById('sync-token-inp').value=syncToken||'';
  if(syncToken&&syncGistId)syncFromGist(false);
  renderMoreFonts();
  isMob()?showMobPanel('list'):showPanel('panel-empty');
}
function doSwitchAcc(){
  CKEY=null;curAccId=null;
  data={entries:[],columns:[],settings:{theme:'dark',defaultFont:''},syncConfig:null};
  st={colId:'__all__',entryId:null,editId:null,q:'',mobQ:'',pendingImgs:[],curViewUrl:''};
  syncToken=null;syncGistId=null;
  showAccList(true);
}
</script>
<script>
/* ===== MOBILE HELPERS ===== */
const isMob=()=>window.innerWidth<768;
function toggleSidebar(){
  const as=document.getElementById('sidebar');
  if(as.classList.contains('mob-open')){as.classList.remove('mob-open');document.getElementById('aside-ov').classList.remove('show');}
  else{as.classList.add('mob-open');document.getElementById('aside-ov').classList.add('show');}
}

/* 其余脚本省略（未改动） */
</script>
</body>
