<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>宏博日记</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16130e">
<style>
/* 你的原有样式保持不变，此处省略以节省篇幅 */
/* 请在最终文件中保留你原有的所有CSS样式 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#16130e;--sf:#201c16;--card:#2a2419;--card2:#342e22;--gold:#e8bc5c;--gdim:#9a7e3a;--tx:#f2e8d0;--tx2:#b8a882;--tx3:#7a6e58;--red:#e06060;--blue:#5aafdf;--green:#5adf9a;--bd:rgba(232,188,92,.2);--bd2:rgba(232,188,92,.4);--paper:#fefbf3;--ink:#1a1008;}
body.light{--bg:#f0ebe0;--sf:#e8e1d4;--card:#ddd6c8;--card2:#d0c8b8;--gold:#8a6420;--gdim:#b08840;--tx:#1a1008;--tx2:#4a3c28;--tx3:#8a7860;--red:#c04040;--blue:#1a6aaa;--green:#2a8a5a;--bd:rgba(138,100,32,.25);--bd2:rgba(138,100,32,.5);--paper:#fff8f0;--ink:#1a1008;}
html,body{height:100%;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:'Microsoft YaHei','PingFang SC',system-ui,sans-serif;height:100%;overflow:hidden;transition:background .25s,color .25s;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;-webkit-appearance:none;}
input,textarea,select{font-family:inherit;-webkit-appearance:none;}
/* 以下样式从原文件保留 ... 请在你的最终文件中保留完整样式 */
.f-songti{font-family:'Songti SC','STSong','华文宋体','宋体',Georgia,serif!important;}
.f-heiti{font-family:'Heiti SC','STHeiti','黑体','PingFang SC',sans-serif!important;}
/* ... 保留你原有的所有CSS ... */
</style>
</head>
<body>

<!-- 认证界面 -->
<div id="auth-container">
  <!-- 账号列表界面 -->
  <div class="auth-screen" id="sc-list">
    <div class="auth-box">
      <span class="auth-book">📖</span>
      <h1 class="auth-title">宏博</h1>
      <p class="auth-sub" id="list-sub">选择账号登录</p>
      <div class="acc-list" id="acc-list"></div>
      <button class="btn-newacc" onclick="showNewAcc()">＋ 新建账号</button>
      <div class="a-foot">
        <button class="btn-xs" onclick="importBackup()">导入备份</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </div>
  </div>

  <!-- 登录界面 -->
  <div class="auth-screen" id="sc-login" style="display:none">
    <div class="auth-box">
      <button class="auth-back" onclick="showAccList()">← 返回</button>
      <span class="auth-book" id="login-av">👤</span>
      <h1 class="auth-title" id="login-name">登录</h1>
      <p class="auth-sub">请输入密码</p>
      <div class="auth-row">
        <div class="pw-wrap">
          <input class="a-input" type="password" id="pw-inp" placeholder="输入密码" autocomplete="current-password">
          <span class="pw-eye" onclick="togglePw('pw-inp')">显示</span>
        </div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-cb" checked>
        <label for="remember-cb">30天内免登录</label>
      </div>
      <span class="a-err" id="login-err"></span>
      <button class="btn-auth" onclick="handleLogin()">登 录</button>
    </div>
  </div>

  <!-- 新建账号界面 -->
  <div class="auth-screen" id="sc-newaccount" style="display:none">
    <div class="auth-box">
      <button class="auth-back" onclick="showAccList()">← 返回</button>
      <span class="auth-book">✨</span>
      <h1 class="auth-title">新建账号</h1>
      <p class="auth-sub">设置账号名和登录密码</p>
      <div class="auth-row">
        <input class="a-input" type="text" id="new-name" placeholder="账号名（2-16字）" maxlength="16">
        <div class="pw-wrap">
          <input class="a-input" type="password" id="new-pw" placeholder="设置密码（至少4位）">
          <span class="pw-eye" onclick="togglePw('new-pw')">显示</span>
        </div>
        <div class="pw-wrap">
          <input class="a-input" type="password" id="new-pw2" placeholder="确认密码">
          <span class="pw-eye" onclick="togglePw('new-pw2')">显示</span>
        </div>
      </div>
      <span class="a-err" id="newaccount-err"></span>
      <button class="btn-auth" onclick="handleNewAccount()">创 建 账 号</button>
    </div>
  </div>
</div>

<!-- 主应用界面 -->
<div id="app" style="display:none">
  <header>
    <div class="hdr-l">
      <button class="mob-menu-btn" onclick="toggleSidebar()">☰</button>
      <span style="font-size:1.2rem">📖</span>
      <span class="app-name">宏博</span>
      <span style="font-size:.72rem;color:var(--tx3)" id="hdr-accname"></span>
    </div>
    <div class="hdr-r">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="hdr-btn" onclick="showAlbum()">相册</button>
      <button class="hdr-btn" onclick="showTimeline()">时间轴</button>
      <button class="hdr-btn gold" onclick="exportData()">💾 备份</button>
      <button class="hdr-btn gold" onclick="logout()">切换</button>
    </div>
  </header>

  <main>
    <div id="aside-ov" onclick="closeSidebar()"></div>
    <aside id="sidebar">
      <div class="col-hdr"><span class="col-hdr-t">专 栏</span><button class="col-add" onclick="showAddColumn()">+</button></div>
      <div class="col-new-form" id="col-form" style="display:none">
        <input class="col-inp" id="col-inp" placeholder="专栏名…" maxlength="20">
        <button class="col-ok" onclick="addColumn()">✓</button>
      </div>
      <div class="col-list" id="col-list"></div>
      <button class="new-btn-desk" onclick="newEntry()">＋ 新的记录</button>
      <div class="s-wrap"><input class="s-inp" type="text" id="s-inp" placeholder="🔍 搜索日记…" oninput="searchEntries(this.value)"></div>
      <div class="e-list" id="e-list"></div>
    </aside>

    <div class="content" id="content">
      <div id="panel-empty" class="panel"><div class="empty-ctr"><div class="empty-icon">📖</div><p class="empty-t">选择日记或新建记录</p></div></div>
      <div id="panel-write" class="panel" style="display:none">
        <div class="mob-back-bar"><button class="mob-back-btn" onclick="cancelWrite()">← 取消</button></div>
        <div class="write-hdr"><span class="write-label" id="write-lbl">📝 新的记录</span><span class="write-dt" id="write-dt"></span></div>
        <div class="form-2col">
          <div><label class="f-lbl">标题</label><input class="f-inp" type="text" id="f-title" placeholder="标题"></div>
          <div><label class="f-lbl">专栏</label><select class="f-sel" id="f-col"></select></div>
        </div>
        <div class="form-g"><label class="f-lbl">📰 链接</label><input class="f-inp" type="url" id="f-url" placeholder="网址"></div>
        <div class="editor-wrap">
          <div class="editor-tb">
            <button class="tb-btn" onclick="formatDoc('bold')"><b>B</b></button>
            <button class="tb-btn" onclick="formatDoc('italic')"><i>I</i></button>
            <button class="tb-btn" onclick="formatDoc('underline')"><u>U</u></button>
            <div class="tb-sep"></div>
            <select class="tb-sel" id="size-sel" onchange="applyFontSize(this.value)"><option value="1">小</option><option value="3" selected>中</option><option value="5">大</option></select>
          </div>
          <div id="editor" class="f-editor" contenteditable="true" data-placeholder="写下你的故事…"></div>
        </div>
        <div class="form-actions"><button class="btn-save" onclick="saveEntry()">保存</button><button class="btn-cancel" onclick="cancelWrite()">取消</button></div>
      </div>
      <div id="panel-view" class="panel" style="display:none"><div id="view-content"></div></div>
    </div>
  </main>
  <div class="mob-nav" id="mob-nav"><div class="mob-nav-inner"><button class="mob-nav-btn" onclick="showMobList()">📋 日记</button><button class="mob-nav-btn" onclick="showAlbum()">🖼️ 相册</button><button class="mob-nav-btn" onclick="showTimeline()">📅 时间轴</button></div></div>
</div>
<div id="toast"></div>

<script>
// ==================== 数据存储 ====================
let currentUser = null;
let currentEntries = [];
let currentColumn = 'all';
let currentEditId = null;
let searchKeyword = '';

// 初始化存储
function initStorage() {
  if (!localStorage.getItem('hongbo_users')) {
    localStorage.setItem('hongbo_users', JSON.stringify([]));
  }
  if (!localStorage.getItem('hongbo_entries')) {
    localStorage.setItem('hongbo_entries', JSON.stringify({}));
  }
}

// 获取所有账号
function getAccounts() {
  return JSON.parse(localStorage.getItem('hongbo_users') || '[]');
}

// 保存账号
function saveAccounts(accounts) {
  localStorage.setItem('hongbo_users', JSON.stringify(accounts));
}

// 获取用户的日记
function getUserEntries(userId) {
  const all = JSON.parse(localStorage.getItem('hongbo_entries') || '{}');
  return all[userId] || [];
}

// 保存用户日记
function saveUserEntries(userId, entries) {
  const all = JSON.parse(localStorage.getItem('hongbo_entries') || '{}');
  all[userId] = entries;
  localStorage.setItem('hongbo_entries', JSON.stringify(all));
}

// ==================== 认证界面 ====================
function showAccList() {
  document.getElementById('sc-list').style.display = 'flex';
  document.getElementById('sc-login').style.display = 'none';
  document.getElementById('sc-newaccount').style.display = 'none';
  renderAccountList();
}

function renderAccountList() {
  const accounts = getAccounts();
  const container = document.getElementById('acc-list');
  if (accounts.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--tx3)">暂无账号，请新建</div>';
    return;
  }
  container.innerHTML = accounts.map((acc, idx) => `
    <div class="acc-card" onclick="selectAccount(${idx})">
      <div class="acc-av" style="background:var(--gold)">${acc.name.charAt(0)}</div>
      <div><div class="acc-name">${escapeHtml(acc.name)}</div></div>
      <button class="acc-del" onclick="event.stopPropagation();deleteAccount(${idx})">🗑️</button>
    </div>
  `).join('');
}

function selectAccount(idx) {
  const accounts = getAccounts();
  currentUser = accounts[idx];
  document.getElementById('login-name').innerText = currentUser.name;
  document.getElementById('login-av').innerHTML = currentUser.name.charAt(0);
  document.getElementById('sc-list').style.display = 'none';
  document.getElementById('sc-login').style.display = 'flex';
  document.getElementById('pw-inp').value = '';
  document.getElementById('login-err').innerText = '';
}

function handleLogin() {
  const pwd = document.getElementById('pw-inp').value;
  if (!currentUser) return;
  if (currentUser.password !== pwd) {
    document.getElementById('login-err').innerText = '密码错误';
    return;
  }
  if (document.getElementById('remember-cb').checked) {
    localStorage.setItem('auto_login', JSON.stringify({ name: currentUser.name, pwd: currentUser.password }));
  }
  startApp();
}

function handleNewAccount() {
  const name = document.getElementById('new-name').value.trim();
  const pwd = document.getElementById('new-pw').value;
  const pwd2 = document.getElementById('new-pw2').value;
  if (name.length < 2) { showErr('newaccount-err', '账号名至少2字'); return; }
  if (pwd.length < 4) { showErr('newaccount-err', '密码至少4位'); return; }
  if (pwd !== pwd2) { showErr('newaccount-err', '两次密码不一致'); return; }
  const accounts = getAccounts();
  if (accounts.some(a => a.name === name)) { showErr('newaccount-err', '账号已存在'); return; }
  accounts.push({ name, password: pwd, created: Date.now() });
  saveAccounts(accounts);
  showAccList();
  showToast('账号创建成功');
}

function showNewAcc() {
  document.getElementById('sc-list').style.display = 'none';
  document.getElementById('sc-newaccount').style.display = 'flex';
  document.getElementById('new-name').value = '';
  document.getElementById('new-pw').value = '';
  document.getElementById('new-pw2').value = '';
}

function deleteAccount(idx) {
  if (confirm('删除账号会同时删除所有日记，不可恢复！')) {
    const accounts = getAccounts();
    const userId = accounts[idx].name;
    accounts.splice(idx, 1);
    saveAccounts(accounts);
    const allEntries = JSON.parse(localStorage.getItem('hongbo_entries') || '{}');
    delete allEntries[userId];
    localStorage.setItem('hongbo_entries', JSON.stringify(allEntries));
    renderAccountList();
  }
}

function startApp() {
  document.getElementById('auth-container').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('hdr-accname').innerText = currentUser.name;
  loadUserData();
  renderColumns();
  renderEntryList();
  if (window.innerWidth <= 767) showMobList();
}

function logout() {
  localStorage.removeItem('auto_login');
  currentUser = null;
  document.getElementById('auth-container').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  showAccList();
}

// ==================== 日记核心功能 ====================
function loadUserData() {
  currentEntries = getUserEntries(currentUser.name);
  currentEntries.sort((a,b) => b.updated - a.updated);
}

function saveUserData() {
  saveUserEntries(currentUser.name, currentEntries);
  renderEntryList();
  renderColumns();
}

function renderEntryList() {
  let filtered = currentEntries;
  if (currentColumn !== 'all') filtered = filtered.filter(e => e.column === currentColumn);
  if (searchKeyword) filtered = filtered.filter(e => e.title.includes(searchKeyword) || e.content.includes(searchKeyword));
  
  const html = filtered.map(e => `
    <div class="e-item" onclick="viewEntry('${e.id}')">
      <div class="e-meta"><span class="e-date">${formatDate(e.updated)}</span>${e.star ? '<span class="e-star">⭐</span>' : ''}</div>
      <div class="e-title">${escapeHtml(e.title || '无标题')}</div>
      <div class="e-prev">${escapeHtml(e.content?.substring(0, 50) || '')}</div>
    </div>
  `).join('');
  document.getElementById('e-list').innerHTML = html || '<div class="list-empty">暂无日记</div>';
  document.getElementById('mob-e-list').innerHTML = html || '<div class="list-empty">暂无日记</div>';
}

function viewEntry(id) {
  const entry = currentEntries.find(e => e.id === id);
  if (!entry) return;
  document.getElementById('panel-empty').style.display = 'none';
  document.getElementById('panel-write').style.display = 'none';
  document.getElementById('panel-view').style.display = 'flex';
  const content = `
    <div class="v-hdr"><div class="v-meta"><span class="v-date">${formatDate(entry.updated)}</span><span class="star-btn" onclick="toggleStar('${entry.id}')">${entry.star ? '⭐' : '☆'}</span></div>
    <h1 class="v-title">${escapeHtml(entry.title || '无标题')}</h1></div>
    ${entry.link ? `<div class="link-card"><div class="link-icon">🔗</div><div><a href="${escapeHtml(entry.link)}" target="_blank" class="link-title-t">${escapeHtml(entry.linkTitle || '查看链接')}</a></div></div>` : ''}
    <div class="v-content">${entry.content || ''}</div>
    <div class="v-actions"><button class="btn-edit" onclick="editEntry('${entry.id}')">编辑</button><button class="btn-del" onclick="deleteEntry('${entry.id}')">删除</button></div>
  `;
  document.getElementById('view-content').innerHTML = content;
}

function newEntry() {
  currentEditId = null;
  document.getElementById('write-lbl').innerText = '📝 新的记录';
  document.getElementById('write-dt').innerText = formatDate(Date.now());
  document.getElementById('f-title').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('editor').innerHTML = '';
  loadColumnsToSelect();
  document.getElementById('panel-empty').style.display = 'none';
  document.getElementById('panel-view').style.display = 'none';
  document.getElementById('panel-write').style.display = 'flex';
}

function editEntry(id) {
  const entry = currentEntries.find(e => e.id === id);
  if (!entry) return;
  currentEditId = id;
  document.getElementById('write-lbl').innerText = '✏️ 编辑日记';
  document.getElementById('write-dt').innerText = formatDate(entry.updated);
  document.getElementById('f-title').value = entry.title || '';
  document.getElementById('f-url').value = entry.link || '';
  document.getElementById('editor').innerHTML = entry.content || '';
  loadColumnsToSelect(entry.column);
  document.getElementById('panel-empty').style.display = 'none';
  document.getElementById('panel-view').style.display = 'none';
  document.getElementById('panel-write').style.display = 'flex';
}

function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  const content = document.getElementById('editor').innerHTML;
  const link = document.getElementById('f-url').value.trim();
  const column = document.getElementById('f-col').value;
  if (!content && !title) { showToast('请填写内容'); return; }
  
  if (currentEditId) {
    const idx = currentEntries.findIndex(e => e.id === currentEditId);
    if (idx !== -1) {
      currentEntries[idx] = { ...currentEntries[idx], title, content, link, column, updated: Date.now() };
    }
  } else {
    currentEntries.unshift({ id: Date.now().toString(), title, content, link, column, star: false, created: Date.now(), updated: Date.now() });
  }
  saveUserData();
  cancelWrite();
  showToast('保存成功');
}

function deleteEntry(id) {
  if (confirm('确定删除吗？')) {
    currentEntries = currentEntries.filter(e => e.id !== id);
    saveUserData();
    cancelWrite();
  }
}

function toggleStar(id) {
  const entry = currentEntries.find(e => e.id === id);
  if (entry) { entry.star = !entry.star; saveUserData(); viewEntry(id); }
}

function cancelWrite() {
  document.getElementById('panel-write').style.display = 'none';
  document.getElementById('panel-empty').style.display = 'flex';
  document.getElementById('panel-view').style.display = 'none';
  renderEntryList();
}

// ==================== 专栏管理 ====================
function getColumns() {
  const colStr = localStorage.getItem(`hongbo_columns_${currentUser.name}`);
  return colStr ? JSON.parse(colStr) : [{ id: 'default', name: '默认' }];
}

function saveColumns(cols) {
  localStorage.setItem(`hongbo_columns_${currentUser.name}`, JSON.stringify(cols));
  renderColumns();
}

function renderColumns() {
  const cols = getColumns();
  const html = cols.map(c => `<div class="col-item ${currentColumn === c.id ? 'active' : ''}" onclick="switchColumn('${c.id}')"><span class="col-dot" style="background:var(--gold)"></span><span class="col-name">${escapeHtml(c.name)}</span><span class="col-cnt">${currentEntries.filter(e => e.column === c.id).length}</span><button class="col-del" onclick="event.stopPropagation();deleteColumn('${c.id}')">✕</button></div>`).join('');
  document.getElementById('col-list').innerHTML = html;
}

function switchColumn(id) {
  currentColumn = id;
  renderColumns();
  renderEntryList();
}

function showAddColumn() {
  document.getElementById('col-form').style.display = 'flex';
}

function addColumn() {
  const name = document.getElementById('col-inp').value.trim();
  if (!name) return;
  const cols = getColumns();
  cols.push({ id: Date.now().toString(), name });
  saveColumns(cols);
  document.getElementById('col-inp').value = '';
  document.getElementById('col-form').style.display = 'none';
}

function deleteColumn(id) {
  if (id === 'default') { showToast('默认专栏不能删除'); return; }
  if (confirm('删除专栏后，其中日记将移至默认专栏')) {
    currentEntries.forEach(e => { if (e.column === id) e.column = 'default'; });
    saveUserData();
    const cols = getColumns().filter(c => c.id !== id);
    saveColumns(cols);
    if (currentColumn === id) switchColumn('default');
  }
}

function loadColumnsToSelect(selectedId = 'default') {
  const cols = getColumns();
  const html = cols.map(c => `<option value="${c.id}" ${selectedId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
  document.getElementById('f-col').innerHTML = html;
}

// ==================== 辅助功能 ====================
function formatDoc(cmd) { document.execCommand(cmd, false, null); }
function applyFontSize(size) { document.execCommand('fontSize', false, size); }
function toggleTheme() { document.body.classList.toggle('light'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mob-open'); document.getElementById('aside-ov').classList.toggle('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('mob-open'); document.getElementById('aside-ov').classList.remove('show'); }
function showMobList() { document.getElementById('panel-empty').style.display = 'flex'; document.getElementById('panel-write').style.display = 'none'; document.getElementById('panel-view').style.display = 'none'; closeSidebar(); }
function showAlbum() { showToast('相册功能开发中'); }
function showTimeline() { showToast('时间轴功能开发中'); }
function searchEntries(kw) { searchKeyword = kw; renderEntryList(); }
function formatDate(ts) { return new Date(ts).toLocaleString('zh-CN'); }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
function togglePw(id) { const i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; }
function showErr(id, msg) { const e = document.getElementById(id); if (e) e.innerText = msg; setTimeout(() => { if (e) e.innerText = ''; }, 2000); }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function exportData() { const data = JSON.stringify({ user: currentUser.name, entries: currentEntries, columns: getColumns() }, null, 2); const a = document.createElement('a'); a.href = 'data:application/json,' + encodeURIComponent(data); a.download = `hongbo_${currentUser.name}_backup.json`; a.click(); showToast('导出成功'); }
function importBackup() { const input = document.getElementById('import-file'); input.onchange = e => { const f = e.target.files[0]; if (!f) return; const reader = new FileReader(); reader.onload = ev => { try { const data = JSON.parse(ev.target.result); if (data.entries) { currentEntries = data.entries; saveUserData(); if (data.columns) saveColumns(data.columns); showToast('导入成功'); renderEntryList(); renderColumns(); } } catch(e) { showToast('文件格式错误'); } }; reader.readAsText(f); }; input.click(); }

// 自动登录检查
function checkAutoLogin() {
  initStorage();
  const auto = localStorage.getItem('auto_login');
  if (auto) {
    try {
      const { name, pwd } = JSON.parse(auto);
      const accounts = getAccounts();
      const user = accounts.find(a => a.name === name && a.password === pwd);
      if (user) { currentUser = user; startApp(); return true; }
    } catch(e) {}
  }
  showAccList();
  return false;
}

checkAutoLogin();
